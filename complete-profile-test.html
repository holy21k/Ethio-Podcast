<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile Test - Ethiopodcasts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            color: white;
        }
        h1 { margin-bottom: 30px; }
        .auth-section {
            background: #16213e;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .section {
            background: #16213e;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
        }
        .section.active { display: block; }
        .section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #667eea;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid #2d3561;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        input[type="file"] {
            padding: 8px;
            cursor: pointer;
        }
        input[type="file"]::-webkit-file-upload-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }
        input[readonly] {
            opacity: 0.7;
            cursor: not-allowed;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            flex: 1;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-right: 10px;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success { background: #00C851; display: block; }
        .message.error { background: #ff4444; display: block; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .user-info img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #667eea;
        }
        .user-info div {
            flex: 1;
        }
        .user-info .name {
            font-weight: 600;
            font-size: 18px;
        }
        .user-info .email {
            color: #a0a0a0;
            font-size: 14px;
        }
        .profile-pic-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
            border: 4px solid #667eea;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Complete Profile & Settings Test</h1>
        
        <div id="message" class="message"></div>
        
        <!-- Auth Section -->
        <div class="auth-section">
            <h2>🔑 Authentication</h2>
            <div id="authStatus">
                <p>Checking authentication...</p>
            </div>
            <div id="userInfo" style="display: none;"></div>
            <button onclick="loginWithGoogle()" id="loginBtn">Login with Google</button>
            <button onclick="logout()" id="logoutBtn" style="display: none;">Logout</button>
        </div>

        <!-- Profile Section -->
        <div class="section" id="profileSection">
            <h2>👤 Edit Profile</h2>
            <img id="profilePicPreview" class="profile-pic-preview" src="https://via.placeholder.com/120" alt="Profile">
            
            <div class="form-group">
                <label for="photoUpload">Upload Profile Photo</label>
                <input type="file" id="photoUpload" accept="image/*" style="padding: 8px;">
                <div id="uploadProgress" style="display: none; margin-top: 10px; color: #667eea;">
                    Uploading: <span id="uploadPercent">0</span>%
                </div>
            </div>
            
            <div class="form-group">
                <label for="displayName">Display Name</label>
                <input type="text" id="displayName" placeholder="Enter your name">
            </div>
            
            <div class="form-group">
                <label for="photoURL">Photo URL (or upload above)</label>
                <input type="url" id="photoURL" placeholder="https://example.com/photo.jpg" readonly>
            </div>
            
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" placeholder="Tell us about yourself..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="interests">Interests (comma separated)</label>
                <input type="text" id="interests" placeholder="Tech, Business, Lifestyle">
            </div>
            
            <button onclick="updateProfile()">Save Profile</button>
            <button onclick="loadProfile()">Reload Profile</button>
        </div>

        <!-- Notifications Section -->
        <div class="section" id="notificationsSection">
            <h2>🔔 Notifications</h2>
            <div class="checkbox-group">
                <input type="checkbox" id="newPodcasts">
                <label for="newPodcasts">New Podcasts</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="channelUpdates">
                <label for="channelUpdates">Channel Updates</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="recommendations">
                <label for="recommendations">Recommendations</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="emailNotif">
                <label for="emailNotif">Email Notifications</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="pushNotif">
                <label for="pushNotif">Push Notifications</label>
            </div>
            <button onclick="updateNotifications()">Save Notifications</button>
            <button onclick="loadNotifications()">Reload Notifications</button>
        </div>

        <!-- Settings Section -->
        <div class="section" id="settingsSection">
            <h2>⚙️ App Settings</h2>
            <div class="form-group">
                <label for="language">Language</label>
                <select id="language">
                    <option value="en">English</option>
                    <option value="am">አማርኛ (Amharic)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="theme">Theme</label>
                <select id="theme">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="auto">Auto</option>
                </select>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="autoplay">
                <label for="autoplay">Autoplay Next Episode</label>
            </div>
            <div class="form-group">
                <label for="playbackSpeed">Playback Speed</label>
                <select id="playbackSpeed">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1.0">1.0x (Normal)</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2.0">2.0x</option>
                </select>
            </div>
            <div class="form-group">
                <label for="quality">Video Quality</label>
                <select id="quality">
                    <option value="auto">Auto</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="form-group">
                <label for="dataUsage">Data Usage</label>
                <select id="dataUsage">
                    <option value="low">Low</option>
                    <option value="standard">Standard</option>
                    <option value="high">High</option>
                </select>
            </div>
            <button onclick="updateSettings()">Save Settings</button>
            <button onclick="loadSettings()">Reload Settings</button>
        </div>

        <!-- Privacy Section -->
        <div class="section" id="privacySection">
            <h2>🔒 Privacy</h2>
            <div class="form-group">
                <label for="profileVisibility">Profile Visibility</label>
                <select id="profileVisibility">
                    <option value="public">Public</option>
                    <option value="private">Private</option>
                    <option value="friends">Friends Only</option>
                </select>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="showHistory">
                <label for="showHistory">Show Listening History</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="showWatchlist">
                <label for="showWatchlist">Show Watchlist</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="allowRecommendations">
                <label for="allowRecommendations">Allow Personalized Recommendations</label>
            </div>
            <button onclick="updatePrivacy()">Save Privacy</button>
            <button onclick="loadPrivacy()">Reload Privacy</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <script>
        const API_BASE = 'http://localhost:3000';

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDBQosoOgqEa0LONZhEZUSVJjV1diFMdCk",
            authDomain: "ethio-podcast-8a2f0.firebaseapp.com",
            projectId: "ethio-podcast-8a2f0",
            storageBucket: "ethio-podcast-8a2f0.firebasestorage.app",
            messagingSenderId: "976795435136",
            appId: "1:976795435136:web:fa34145b172223cdad6665",
            measurementId: "G-268RCQ7PBM"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();

        // Handle photo upload
        document.addEventListener('DOMContentLoaded', () => {
            const photoUpload = document.getElementById('photoUpload');
            
            photoUpload.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                // Validate file type
                if (!file.type.startsWith('image/')) {
                    showMessage('Please select an image file', true);
                    return;
                }
                
                // Validate file size (max 5MB)
                if (file.size > 5 * 1024 * 1024) {
                    showMessage('Image must be less than 5MB', true);
                    return;
                }
                
                try {
                    const user = firebase.auth().currentUser;
                    if (!user) {
                        showMessage('Please login first', true);
                        return;
                    }
                    
                    // Show upload progress
                    document.getElementById('uploadProgress').style.display = 'block';
                    
                    // Create unique filename
                    const timestamp = Date.now();
                    const filename = `profile-photos/${user.uid}/${timestamp}-${file.name}`;
                    
                    // Upload to Firebase Storage
                    const storageRef = storage.ref(filename);
                    const uploadTask = storageRef.put(file);
                    
                    // Monitor upload progress
                    uploadTask.on('state_changed',
                        (snapshot) => {
                            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                            document.getElementById('uploadPercent').textContent = Math.round(progress);
                        },
                        (error) => {
                            console.error('Upload error:', error);
                            showMessage('Upload failed: ' + error.message, true);
                            document.getElementById('uploadProgress').style.display = 'none';
                        },
                        async () => {
                            // Upload complete - get download URL
                            const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                            
                            // Update the photo URL field
                            document.getElementById('photoURL').value = downloadURL;
                            document.getElementById('profilePicPreview').src = downloadURL;
                            
                            document.getElementById('uploadProgress').style.display = 'none';
                            showMessage('✅ Photo uploaded! Click "Save Profile" to update.');
                        }
                    );
                } catch (error) {
                    console.error('Upload error:', error);
                    showMessage('Upload failed: ' + error.message, true);
                    document.getElementById('uploadProgress').style.display = 'none';
                }
            });
        });

        // Show message
        function showMessage(text, isError = false) {
            const msgEl = document.getElementById('message');
            msgEl.className = 'message ' + (isError ? 'error' : 'success');
            msgEl.textContent = text;
            setTimeout(() => {
                msgEl.className = 'message';
            }, 5000);
        }

        // Get token
        async function getToken() {
            const user = firebase.auth().currentUser;
            if (!user) {
                throw new Error('Not logged in');
            }
            return await user.getIdToken();
        }

        // Login with Google
        async function loginWithGoogle() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                await firebase.auth().signInWithPopup(provider);
                showMessage('Logged in successfully!');
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Login failed: ' + error.message, true);
            }
        }

        // Logout
        async function logout() {
            try {
                await firebase.auth().signOut();
                showMessage('Logged out successfully!');
            } catch (error) {
                showMessage('Logout failed: ' + error.message, true);
            }
        }

        // Load profile
        async function loadProfile() {
            try {
                const token = await getToken();
                const response = await fetch(`${API_BASE}/api/user/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                console.log('Profile data:', data);
                
                if (data.status === 'success') {
                    const p = data.data.profile;
                    document.getElementById('displayName').value = p.displayName || '';
                    document.getElementById('photoURL').value = p.photoURL || '';
                    document.getElementById('bio').value = p.bio || '';
                    document.getElementById('interests').value = (p.interests || []).join(', ');
                    
                    const pic = document.getElementById('profilePicPreview');
                    pic.src = p.photoURL || 'https://via.placeholder.com/120?text=' + (p.displayName?.[0] || 'U');
                    
                    showMessage('Profile loaded!');
                } else {
                    showMessage('Failed to load profile: ' + data.message, true);
                }
            } catch (error) {
                console.error('Load profile error:', error);
                showMessage('Error: ' + error.message, true);
            }
        }

        // Update profile
        async function updateProfile() {
            try {
                const token = await getToken();
                
                const displayName = document.getElementById('displayName').value.trim();
                const photoURL = document.getElementById('photoURL').value.trim();
                const bio = document.getElementById('bio').value.trim();
                const interestsInput = document.getElementById('interests').value.trim();
                const interests = interestsInput ? interestsInput.split(',').map(i => i.trim()).filter(i => i) : [];
                
                const response = await fetch(`${API_BASE}/api/user/profile`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ displayName, photoURL, bio, interests })
                });
                
                const data = await response.json();
                console.log('Update response:', data);
                
                if (data.status === 'success') {
                    showMessage('✅ Profile updated successfully!');
                    if (photoURL) {
                        document.getElementById('profilePicPreview').src = photoURL;
                    }
                } else {
                    showMessage('Failed: ' + data.message, true);
                }
            } catch (error) {
                console.error('Update profile error:', error);
                showMessage('Error: ' + error.message, true);
            }
        }

        // Load notifications
        async function loadNotifications() {
            try {
                const token = await getToken();
                const response = await fetch(`${API_BASE}/api/user/notifications`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                console.log('Notifications data:', data);
                
                if (data.status === 'success') {
                    const n = data.data.notifications;
                    document.getElementById('newPodcasts').checked = n.newPodcasts !== false;
                    document.getElementById('channelUpdates').checked = n.channelUpdates !== false;
                    document.getElementById('recommendations').checked = n.recommendations !== false;
                    document.getElementById('emailNotif').checked = n.email !== false;
                    document.getElementById('pushNotif').checked = n.push !== false;
                    showMessage('Notifications loaded!');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, true);
            }
        }

        // Update notifications
        async function updateNotifications() {
            try {
                const token = await getToken();
                const body = {
                    newPodcasts: document.getElementById('newPodcasts').checked,
                    channelUpdates: document.getElementById('channelUpdates').checked,
                    recommendations: document.getElementById('recommendations').checked,
                    email: document.getElementById('emailNotif').checked,
                    push: document.getElementById('pushNotif').checked
                };

                const response = await fetch(`${API_BASE}/api/user/notifications`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                console.log('Update notifications response:', data);
                
                if (data.status === 'success') {
                    showMessage('✅ Notifications updated!');
                } else {
                    showMessage('Failed: ' + data.message, true);
                }
            } catch (error) {
                showMessage('Error: ' + error.message, true);
            }
        }

        // Load settings
        async function loadSettings() {
            try {
                const token = await getToken();
                const response = await fetch(`${API_BASE}/api/user/settings`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                console.log('Settings data:', data);
                
                if (data.status === 'success') {
                    const s = data.data.settings;
                    document.getElementById('language').value = s.language || 'en';
                    document.getElementById('theme').value = s.theme || 'light';
                    document.getElementById('autoplay').checked = s.autoplay !== false;
                    document.getElementById('playbackSpeed').value = s.playbackSpeed || 1.0;
                    document.getElementById('quality').value = s.quality || 'auto';
                    document.getElementById('dataUsage').value = s.dataUsage || 'standard';
                    showMessage('Settings loaded!');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, true);
            }
        }

        // Update settings
        async function updateSettings() {
            try {
                const token = await getToken();
                const body = {
                    language: document.getElementById('language').value,
                    theme: document.getElementById('theme').value,
                    autoplay: document.getElementById('autoplay').checked,
                    playbackSpeed: parseFloat(document.getElementById('playbackSpeed').value),
                    quality: document.getElementById('quality').value,
                    dataUsage: document.getElementById('dataUsage').value
                };

                const response = await fetch(`${API_BASE}/api/user/settings`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                console.log('Update settings response:', data);
                
                if (data.status === 'success') {
                    showMessage('✅ Settings updated!');
                } else {
                    showMessage('Failed: ' + data.message, true);
                }
            } catch (error) {
                showMessage('Error: ' + error.message, true);
            }
        }

        // Load privacy
        async function loadPrivacy() {
            try {
                const token = await getToken();
                const response = await fetch(`${API_BASE}/api/user/privacy`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                console.log('Privacy data:', data);
                
                if (data.status === 'success') {
                    const p = data.data.privacy;
                    document.getElementById('profileVisibility').value = p.profileVisibility || 'public';
                    document.getElementById('showHistory').checked = p.showHistory === true;
                    document.getElementById('showWatchlist').checked = p.showWatchlist === true;
                    document.getElementById('allowRecommendations').checked = p.allowRecommendations !== false;
                    showMessage('Privacy settings loaded!');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, true);
            }
        }

        // Update privacy
        async function updatePrivacy() {
            try {
                const token = await getToken();
                const body = {
                    profileVisibility: document.getElementById('profileVisibility').value,
                    showHistory: document.getElementById('showHistory').checked,
                    showWatchlist: document.getElementById('showWatchlist').checked,
                    allowRecommendations: document.getElementById('allowRecommendations').checked
                };

                const response = await fetch(`${API_BASE}/api/user/privacy`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json();
                console.log('Update privacy response:', data);
                
                if (data.status === 'success') {
                    showMessage('✅ Privacy settings updated!');
                } else {
                    showMessage('Failed: ' + data.message, true);
                }
            } catch (error) {
                showMessage('Error: ' + error.message, true);
            }
        }

        // Update photo preview
        document.addEventListener('DOMContentLoaded', () => {
            const photoURLInput = document.getElementById('photoURL');
            photoURLInput.addEventListener('input', (e) => {
                const url = e.target.value.trim();
                if (url) {
                    document.getElementById('profilePicPreview').src = url;
                }
            });
        });

        // Auth state listener
        firebase.auth().onAuthStateChanged(async (user) => {
            const authStatus = document.getElementById('authStatus');
            const userInfo = document.getElementById('userInfo');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (user) {
                // User is logged in
                authStatus.innerHTML = '<p style="color: #00C851;">✅ Logged in</p>';
                userInfo.innerHTML = `
                    <div class="user-info">
                        <img src="${user.photoURL || 'https://via.placeholder.com/60'}" alt="User">
                        <div>
                            <div class="name">${user.displayName || 'User'}</div>
                            <div class="email">${user.email}</div>
                        </div>
                    </div>
                `;
                userInfo.style.display = 'block';
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                
                // Show all sections
                document.querySelectorAll('.section').forEach(s => s.classList.add('active'));
                
                // Load all data
                try {
                    await Promise.all([
                        loadProfile(),
                        loadNotifications(),
                        loadSettings(),
                        loadPrivacy()
                    ]);
                } catch (error) {
                    console.error('Error loading data:', error);
                }
            } else {
                // User is not logged in
                authStatus.innerHTML = '<p style="color: #ff4444;">❌ Not logged in</p>';
                userInfo.style.display = 'none';
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                
                // Hide all sections
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            }
        });
    </script>
</body>
</html>
