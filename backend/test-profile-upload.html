<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Profile Photo Upload - Supabase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .photo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .photo-preview {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #667eea;
            margin-bottom: 20px;
            background: #f0f0f0;
        }
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .file-input-label {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .file-input-label:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
            font-size: 14px;
        }
        .btn-primary {
            background: #10b981;
            color: white;
        }
        .btn-primary:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .auth-section {
            background: #f9fafb;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }
        .status.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        .status.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #3b82f6;
        }
        .file-info {
            font-size: 12px;
            color: #6b7280;
            margin-top: 10px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Profile Photo Upload Test</h1>
        <p class="subtitle">Test Supabase storage integration</p>

        <!-- Auth Section -->
        <div class="auth-section" id="authSection">
            <h3 style="margin-bottom: 15px; color: #374151;">🔐 Login First</h3>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="login()">Login</button>
        </div>

        <!-- Photo Upload Section (hidden until logged in) -->
        <div id="uploadSection" style="display: none;">
            <div class="photo-section">
                <img id="photoPreview" class="photo-preview" src="https://ui-avatars.com/api/?name=User&size=200&background=667eea&color=fff" alt="Profile Photo">
                
                <div class="file-input-wrapper">
                    <input type="file" id="photoInput" accept="image/*">
                    <label class="file-input-label">Choose Photo</label>
                </div>
                
                <div class="file-info" id="fileInfo">No file selected</div>
                
                <div style="margin-top: 20px;">
                    <button class="btn btn-primary" onclick="uploadPhoto()" id="uploadBtn" disabled>
                        Upload Photo
                    </button>
                    <button class="btn btn-danger" onclick="deletePhoto()" id="deleteBtn">
                        Delete Photo
                    </button>
                </div>
            </div>

            <div class="status info">
                <strong>Instructions:</strong><br>
                1. Choose an image file (max 5MB)<br>
                2. Preview will show automatically<br>
                3. Click "Upload Photo" to save to Supabase<br>
                4. Photo URL will be saved to your profile
            </div>
        </div>

        <div id="statusMessage"></div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDBQosoOgqEa0LONZhEZUSVJjV1diFMdCk",
            authDomain: "ethio-podcast-8a2f0.firebaseapp.com",
            projectId: "ethio-podcast-8a2f0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentToken = null;

        // Login function
        window.login = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showStatus('Please enter email and password', 'error');
                return;
            }

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                currentToken = await userCredential.user.getIdToken();
                
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('uploadSection').style.display = 'block';
                
                showStatus('✅ Logged in successfully!', 'success');
                
                // Load current profile photo
                loadCurrentPhoto();
            } catch (error) {
                showStatus('Login failed: ' + error.message, 'error');
            }
        };

        // Load current profile photo
        async function loadCurrentPhoto() {
            try {
                const response = await fetch('http://localhost:3000/api/user/profile', {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });
                
                const data = await response.json();
                if (data.status === 'success' && data.data.profile.photoURL) {
                    document.getElementById('photoPreview').src = data.data.profile.photoURL;
                }
            } catch (error) {
                console.error('Failed to load profile:', error);
            }
        }

        // Preview image when selected
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // Check file size
                if (file.size > 5 * 1024 * 1024) {
                    showStatus('Image too large. Maximum size is 5MB.', 'error');
                    this.value = '';
                    return;
                }

                // Show file info
                const sizeKB = (file.size / 1024).toFixed(2);
                document.getElementById('fileInfo').textContent = `${file.name} (${sizeKB} KB)`;
                
                // Preview image
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photoPreview').src = e.target.result;
                };
                reader.readAsDataURL(file);
                
                // Enable upload button
                document.getElementById('uploadBtn').disabled = false;
            }
        });

        // Upload photo
        window.uploadPhoto = async function() {
            const fileInput = document.getElementById('photoInput');
            const file = fileInput.files[0];
            
            if (!file) {
                showStatus('Please select a photo first', 'error');
                return;
            }

            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = 'Uploading... <span class="loading"></span>';

            try {
                // Convert to base64
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const base64Image = e.target.result;
                    
                    try {
                        const response = await fetch('http://localhost:3000/api/user/upload-photo', {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${currentToken}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ base64Image })
                        });
                        
                        const data = await response.json();
                        
                        if (data.status === 'success') {
                            showStatus('✅ Photo uploaded successfully!', 'success');
                            console.log('Photo URL:', data.data.photoURL);
                            
                            // Clear file input
                            fileInput.value = '';
                            document.getElementById('fileInfo').textContent = 'No file selected';
                        } else {
                            showStatus('Upload failed: ' + data.message, 'error');
                        }
                    } catch (error) {
                        showStatus('Upload error: ' + error.message, 'error');
                    } finally {
                        uploadBtn.disabled = false;
                        uploadBtn.innerHTML = 'Upload Photo';
                    }
                };
                
                reader.readAsDataURL(file);
            } catch (error) {
                showStatus('Error reading file: ' + error.message, 'error');
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = 'Upload Photo';
            }
        };

        // Delete photo
        window.deletePhoto = async function() {
            if (!confirm('Are you sure you want to delete your profile photo?')) {
                return;
            }

            const deleteBtn = document.getElementById('deleteBtn');
            deleteBtn.disabled = true;
            deleteBtn.innerHTML = 'Deleting... <span class="loading"></span>';

            try {
                const response = await fetch('http://localhost:3000/api/user/photo', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    showStatus('✅ Photo deleted successfully!', 'success');
                    document.getElementById('photoPreview').src = data.data.photoURL;
                    
                    // Clear file input
                    document.getElementById('photoInput').value = '';
                    document.getElementById('fileInfo').textContent = 'No file selected';
                    document.getElementById('uploadBtn').disabled = true;
                } else {
                    showStatus('Delete failed: ' + data.message, 'error');
                }
            } catch (error) {
                showStatus('Delete error: ' + error.message, 'error');
            } finally {
                deleteBtn.disabled = false;
                deleteBtn.innerHTML = 'Delete Photo';
            }
        };

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
            statusDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
